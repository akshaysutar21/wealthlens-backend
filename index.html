<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WealthLens Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { darkbg: '#0b0f19', cardbg: '#121826' } } } }
    </script>
    <style> ::-webkit-scrollbar { display: none; } </style>
</head>
<body class="bg-darkbg text-gray-100 min-h-screen font-sans pb-20">

    <header class="bg-cardbg border-b border-gray-800 p-4 sticky top-0 z-40 flex justify-between items-center shadow-lg">
        <h1 class="text-xl font-bold tracking-wide text-white flex items-center gap-2">
            <span class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-black">W</span>
            WealthLens
        </h1>
        <div class="flex gap-2">
            <button onclick="openTransactionModal()" class="bg-blue-500 text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow-lg shadow-blue-500/20">Add Tx</button>
            <button onclick="openAccountModal()" class="bg-emerald-500 text-black px-3 py-1.5 rounded-lg text-sm font-bold shadow-lg shadow-emerald-500/20">+ Acct</button>
            <button onclick="toggleSettings()" class="bg-gray-800 text-gray-300 px-2 py-1.5 rounded-lg text-sm">⚙️</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- Settings Panel for API Key (Hidden by default) -->
        <div id="settingsPanel" class="hidden bg-cardbg p-4 rounded-2xl border border-gray-700 space-y-3">
            <h3 class="text-sm font-bold text-white">Security Settings</h3>
            <div>
                <label class="text-xs text-gray-400 mb-1 block">API Secret Key</label>
                <input id="apiKeyInput" type="password" placeholder="Enter your APP_SECRET_KEY" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-2.5 text-xs text-white">
            </div>
            <button onclick="saveApiKey()" class="w-full bg-emerald-500 text-black font-bold py-2 rounded-xl text-xs">Save & Connect</button>
        </div>

        <input id="apiUrl" type="hidden" value="https://wealthlens-backend-11f5.onrender.com">

        <!-- Macro Dashboard -->
        <section class="grid grid-cols-2 gap-3">
            <div class="bg-cardbg p-4 rounded-2xl border border-gray-800">
                <p class="text-xs text-gray-400">Net Worth</p>
                <h2 id="netWorthDisplay" class="text-xl font-bold text-white mt-1">₹0</h2>
            </div>
            <div class="bg-cardbg p-4 rounded-2xl border border-gray-800">
                <p class="text-xs text-gray-400">Total Monthly Spend</p>
                <h2 id="monthlySpendDisplay" class="text-xl font-bold text-red-400 mt-1">₹0</h2>
            </div>
            <div class="bg-cardbg p-4 rounded-2xl border border-gray-800">
                <p class="text-xs text-gray-400">Total Liquid Cash</p>
                <h2 id="cashDisplay" class="text-lg font-bold text-emerald-400 mt-1">₹0</h2>
            </div>
            <div class="bg-cardbg p-4 rounded-2xl border border-gray-800">
                <p class="text-xs text-gray-400">Total CC Bill Due</p>
                <h2 id="ccDueDisplay" class="text-lg font-bold text-amber-400 mt-1">₹0</h2>
            </div>
        </section>

        <!-- Bank Accounts Section -->
        <section class="space-y-3">
            <h3 class="text-sm font-semibold text-gray-300">Bank Accounts (Liquid Assets)</h3>
            <div id="bankContainer" class="space-y-3"></div>
        </section>

        <!-- Credit Cards Section -->
        <section class="space-y-3">
            <h3 class="text-sm font-semibold text-gray-300">Credit Cards (Liabilities)</h3>
            <div id="ccContainer" class="space-y-3"></div>
        </section>
    </main>

    <!-- Add Account Modal -->
    <div id="addAccountModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-cardbg w-full max-w-md rounded-3xl border border-gray-700 p-6 space-y-4">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-lg font-bold text-white">Add Account</h3>
                <button onclick="closeModal('addAccountModal')" class="text-gray-400 text-xl">&times;</button>
            </div>
            <input id="accName" type="text" placeholder="Institution Name (e.g. HDFC Salary)" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white">
            <input id="accNumber" type="text" placeholder="Last 4 Digits (e.g. 4821)" maxlength="4" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white">
            <select id="accType" onchange="toggleLimitField()" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white">
                <option value="Bank Account">Bank Account</option>
                <option value="Credit Card">Credit Card</option>
            </select>
            <input id="accBalance" type="number" placeholder="Current Balance / CC Outstanding" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white">
            <input id="accLimit" type="number" placeholder="Credit Limit (For CCs only)" class="hidden w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white">
            <button onclick="saveAccount()" class="w-full bg-emerald-500 text-black font-bold py-3 rounded-xl mt-2">Save Account</button>
        </div>
    </div>

    <!-- Add Transaction Modal -->
    <div id="addTxModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-cardbg w-full max-w-md rounded-3xl border border-gray-700 p-6 space-y-4">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-lg font-bold text-white">Log Transaction</h3>
                <button onclick="closeModal('addTxModal')" class="text-gray-400 text-xl">&times;</button>
            </div>
            <select id="txType" onchange="handleTxTypeChange()" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white">
                <option value="expense">Expense (Spent Money)</option>
                <option value="income">Income (Received Money)</option>
                <option value="payment">CC Bill Payment</option>
            </select>

            <div id="targetAccountWrapper">
                <label class="text-xs text-gray-400 mb-1 block" id="targetAccountLabel">Select Account</label>
                <select id="txAccount" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white"></select>
            </div>

            <div id="sourceAccountWrapper" class="hidden">
                <label class="text-xs text-gray-400 mb-1 block">Paid From Which Bank Account?</label>
                <select id="txSourceAccount" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white"></select>
            </div>

            <input id="txAmount" type="number" placeholder="Amount (₹)" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white">
            <input id="txDesc" type="text" placeholder="Description (e.g. Salary, Fuel, Bill Payment)" class="w-full bg-gray-900 border border-gray-700 rounded-xl p-3 text-white">
            <button onclick="saveTransaction()" class="w-full bg-blue-500 text-white font-bold py-3 rounded-xl mt-2">Save Transaction</button>
        </div>
    </div>

    <script>
        const baseUrl = document.getElementById('apiUrl').value;
        let globalAccounts = [];

        function getHeaders() {
            const key = localStorage.getItem('wealthlens_api_key') || '';
            return {
                'Content-Type': 'application/json',
                'x-api-key': key
            };
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.classList.toggle('hidden');
            const savedKey = localStorage.getItem('wealthlens_api_key');
            if(savedKey) { document.getElementById('apiKeyInput').value = savedKey; }
        }

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if(!key) return alert('Please enter a key');
            localStorage.setItem('wealthlens_api_key', key);
            document.getElementById('settingsPanel').classList.add('hidden');
            fetchDashboard();
        }

        function formatINR(num) { return '₹' + parseFloat(num).toLocaleString('en-IN'); }
        function openAccountModal() { document.getElementById('addAccountModal').classList.remove('hidden'); }
        function openTransactionModal() { document.getElementById('addTxModal').classList.remove('hidden'); handleTxTypeChange(); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function toggleLimitField() {
            const type = document.getElementById('accType').value;
            const limitInput = document.getElementById('accLimit');
            if (type === 'Credit Card') limitInput.classList.remove('hidden');
            else { limitInput.classList.add('hidden'); limitInput.value = ''; }
        }

        function handleTxTypeChange() {
            const type = document.getElementById('txType').value;
            const targetSelect = document.getElementById('txAccount');
            const sourceWrapper = document.getElementById('sourceAccountWrapper');
            const targetLabel = document.getElementById('targetAccountLabel');

            targetSelect.innerHTML = '';
            
            if (type === 'expense') {
                targetLabel.innerText = "Charged To (Bank or Credit Card)";
                sourceWrapper.classList.add('hidden');
                globalAccounts.forEach(acc => {
                    targetSelect.innerHTML += `<option value="${acc.id}">${acc.name} (${acc.type === 'bank' ? 'Bank' : 'CC'})</option>`;
                });
            } else if (type === 'income') {
                targetLabel.innerText = "Deposit Into Bank Account";
                sourceWrapper.classList.add('hidden');
                globalAccounts.filter(acc => acc.type === 'bank').forEach(acc => {
                    targetSelect.innerHTML += `<option value="${acc.id}">${acc.name}</option>`;
                });
            } else if (type === 'payment') {
                targetLabel.innerText = "Credit Card Being Paid";
                sourceWrapper.classList.remove('hidden');
                
                globalAccounts.filter(acc => acc.type === 'credit_card').forEach(acc => {
                    targetSelect.innerHTML += `<option value="${acc.id}">${acc.name}</option>`;
                });
                
                const sourceSelect = document.getElementById('txSourceAccount');
                sourceSelect.innerHTML = '';
                globalAccounts.filter(acc => acc.type === 'bank').forEach(acc => {
                    sourceSelect.innerHTML += `<option value="${acc.id}">${acc.name} (Bal: ₹${acc.balance})</option>`;
                });
            }
        }

        async function fetchDashboard() {
            try {
                const res = await fetch(`${baseUrl}/api/dashboard`, { headers: getHeaders() });
                if (res.status === 401) {
                    document.getElementById('settingsPanel').classList.remove('hidden');
                    alert('Unauthorized: Please enter your correct API Secret Key in settings.');
                    return;
                }
                const data = await res.json();
                globalAccounts = data.accounts;

                document.getElementById('netWorthDisplay').innerText = formatINR(data.net_worth);
                document.getElementById('cashDisplay').innerText = formatINR(data.total_cash);
                document.getElementById('ccDueDisplay').innerText = formatINR(data.total_cc_due);
                document.getElementById('monthlySpendDisplay').innerText = formatINR(data.monthly_spend);

                renderAccounts(data.accounts);
            } catch (e) { console.error("Error fetching dashboard", e); }
        }

        function renderAccounts(accounts) {
            const bankDiv = document.getElementById('bankContainer');
            const ccDiv = document.getElementById('ccContainer');
            bankDiv.innerHTML = ''; ccDiv.innerHTML = '';

            accounts.forEach(acc => {
                const bal = parseFloat(acc.balance);
                const accNoTag = acc.account_number ? `<span class="text-xs text-gray-500 font-normal ml-1">• ${acc.account_number}</span>` : '';

                if (acc.type === 'bank') {
                    bankDiv.innerHTML += `
                        <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-800 flex justify-between items-center">
                            <span class="font-medium text-white">${acc.name} ${accNoTag}</span>
                            <span class="font-bold text-emerald-400">${formatINR(bal)}</span>
                        </div>`;
                } else if (acc.type === 'credit_card') {
                    const limit = parseFloat(acc.credit_limit);
                    const utilPct = limit > 0 ? Math.min((bal / limit) * 100, 100).toFixed(1) : 0;
                    
                    ccDiv.innerHTML += `
                        <div class="bg-gray-900/50 p-4 rounded-xl border border-gray-800">
                            <div class="flex justify-between items-center mb-3">
                                <span class="font-medium text-white">${acc.name} ${accNoTag}</span>
                                <span class="font-bold text-amber-400">Due: ${formatINR(bal)}</span>
                            </div>
                            <div class="w-full bg-gray-800 rounded-full h-2 mt-2">
                                <div class="bg-amber-500 h-2 rounded-full" style="width: ${utilPct}%"></div>
                            </div>
                            <div class="flex justify-between text-[10px] text-gray-500 mt-1">
                                <span>${utilPct}% Utilized</span>
                                <span>Limit: ${formatINR(limit)}</span>
                            </div>
                        </div>`;
                }
            });
        }

        async function saveAccount() {
            const name = document.getElementById('accName').value;
            const number = document.getElementById('accNumber').value;
            const type = document.getElementById('accType').value;
            const balance = document.getElementById('accBalance').value || 0;
            const limit = document.getElementById('accLimit').value || 0;

            if(!name) return alert('Institution Name required');

            await fetch(`${baseUrl}/api/accounts`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ name, type, balance: parseFloat(balance), credit_limit: parseFloat(limit), account_number: number })
            });
            
            closeModal('addAccountModal');
            document.getElementById('accName').value = '';
            document.getElementById('accNumber').value = '';
            document.getElementById('accBalance').value = '';
            fetchDashboard();
        }

        async function saveTransaction() {
            const txType = document.getElementById('txType').value;
            const accId = document.getElementById('txAccount').value;
            const amount = document.getElementById('txAmount').value;
            const desc = document.getElementById('txDesc').value;
            
            const sourceAccVal = document.getElementById('txSourceAccount').value;
            const sourceAccId = (txType === 'payment' && sourceAccVal) ? parseInt(sourceAccVal) : null;

            if(!accId || !amount) return alert('Account and Amount are required');

            await fetch(`${baseUrl}/api/transactions`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ 
                    account_id: parseInt(accId), 
                    type: txType, 
                    amount: parseFloat(amount), 
                    description: desc,
                    source_account_id: sourceAccId
                })
            });
            
            closeModal('addTxModal');
            document.getElementById('txAmount').value = '';
            document.getElementById('txDesc').value = '';
            fetchDashboard();
        }

        document.addEventListener('DOMContentLoaded', fetchDashboard);
    </script>
</body>
</html>
